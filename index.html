<!DOCTYPE html>
<html>
<head>
    <title>Cloud Game Demo</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 2px solid #fff; background: #000; cursor: none; }
    </style>
</head>
<body>
    <div style="position: absolute; top: 10px;">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let ball = { x: 200, y: 0, speed: 5 };
        let paddle = { x: 150, width: 100, height: 10 };

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            paddle.x = e.clientX - rect.left - paddle.width / 2;
        });

        function update() {
            ball.y += ball.speed;
            if (ball.y > canvas.height) { // Game Over reset
                ball.y = 0; ball.x = Math.random() * canvas.width; score = 0; ball.speed = 5;
            }
            // Kiểm tra va chạm với thanh hứng
            if (ball.y + 10 > canvas.height - 20 && ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                score++;
                ball.y = 0; ball.x = Math.random() * canvas.width;
                ball.speed += 0.5; // Khó dần
            }
            document.getElementById('score').innerText = score;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(ball.x, ball.y, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'cyan'; ctx.fillRect(paddle.x, canvas.height - 20, paddle.width, paddle.height);
            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
